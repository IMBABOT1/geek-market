<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8"/>

    <title>Редактирование товара</title>

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.1.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js"></script>
</head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<H3>Редактирование товара</H3>
<form method="get" th:action="@{/edit}">

    <div class="form-group col-md-6">
        <label for="changeId">Изменить Id товара</label>
        <input class="form-control" name="id" type="number" id="changeId">
    </div>

    <div class="form-group col-md-6">
        <label for="changeTitle">Изменить название товара</label>
        <input class="form-control" name="title" type="text" id="changeTitle">
    </div>

    <div class="form-group col-md-6">
        <label for="changePrice">Изменить цену товара</label>
        <input class="form-control" name="price" type="number" id="changePrice">
    </div>

    <button class="btn btn-primary" type="submit">Применить</button>

    <br>

    <table class="table table-hover">
        <thead class="thead-dark">
        <tr>
            <th>ID</th>
            <th>Название</th>
            <th>Цена</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${products}">
            <td th:text="${p.getId()}"/>
            <td th:text="${p.title}"/>
            <td th:text="${p.price}"/>

        </tr>
        </tbody>
    </table>
</form>


</body>
</html>
